name: Régénérer produits.csv

on:
  schedule:
    # Tous les matins à 7h00 UTC
    - cron: '0 7 * * *'
  workflow_dispatch:  # Permet un déclenchement manuel

jobs:
  generate-csv:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout du dépôt
        uses: actions/checkout@v4

      - name: Configurer Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Générer produits.csv
        run: python scripts/generate_produits_csv.py

      - name: Committer et pousser produits.csv
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add produits.csv
          git diff --cached --quiet || git commit -m "chore: régénération automatique de produits.csv [$(date -u '+%Y-%m-%d')]"
          git push
